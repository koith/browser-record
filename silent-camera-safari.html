<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>기록 메모</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root { --bg:#f7f6f3; --panel:#fff; --border:#eceae5; --text:#1a1a18; --sub:#9b9890; --blue:#0a84ff; --accent:#c8732e; --red:#d9543b; --green:#2e9e5b; --paper:#fffefb; --chip:#efece6; --chip2:#e3dfd7; }
  body.dark { --bg:#0f0f0e; --panel:#1a1a18; --border:#2e2c28; --text:#f0eeea; --sub:#8a877f; --accent:#e08a45; --paper:#1a1a18; --chip:#262420; --chip2:#34312b; }
  .folder-group { margin-bottom:18px; }
  .folder-group .group-head { font-size:13px; font-weight:700; color:var(--accent); letter-spacing:.02em; padding:4px 4px 10px; display:flex; align-items:center; gap:6px; }
  .folder-group .group-head span { color:var(--sub); font-weight:500; }
  .folder-group .swipe-wrap { margin-bottom:8px; }
  html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
  body { display:flex; flex-direction:column; }

  .header { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:calc(8px + env(safe-area-inset-top)) 14px 8px; border-bottom:.5px solid var(--border); background:var(--panel); }
  .header .h-left { display:flex; align-items:center; gap:8px; min-width:0; }
  .header .folder-btn { border:none; background:var(--chip); color:var(--accent); font-size:14px; font-weight:600; padding:7px 12px; border-radius:10px; display:flex; align-items:center; gap:4px; white-space:nowrap; }
  .header .title { font-size:20px; font-weight:700; letter-spacing:-0.02em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .header .count { font-size:13px; color:var(--sub); white-space:nowrap; }

  .main { flex:1; position:relative; overflow:hidden; }

  .subbar { flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--panel); border-bottom:.5px solid var(--border); }
  .subbar.hidden { display:none; }
  .search-field { flex:1; display:flex; align-items:center; gap:6px; background:var(--chip); border-radius:10px; padding:8px 10px; min-width:0; color:var(--sub); }
  .search-field input { flex:1; border:none; background:transparent; outline:none; font-size:15px; color:var(--text); min-width:0; }
  .search-field button { border:none; background:none; color:var(--sub); font-size:14px; padding:0 2px; }
  .sort-btn { flex:0 0 auto; border:none; background:var(--chip); color:var(--accent); font-size:14px; font-weight:600; padding:8px 12px; border-radius:10px; white-space:nowrap; }

  /* generic swipe row */
  .swipe-wrap { position:relative; overflow:hidden; border-radius:14px; margin-bottom:10px; }
  .swipe-actions { position:absolute; top:0; right:0; height:100%; display:flex; align-items:stretch; }
  .swipe-actions button { border:none; color:#fff; font-size:14px; font-weight:600; width:72px; display:flex; align-items:center; justify-content:center; }
  .swipe-actions .move { background:var(--blue); }
  .swipe-actions .del { background:var(--red); }
  .swipe-actions .edit { background:#8e8e93; }
  .swipe-content { position:relative; background:var(--panel); transition:transform .22s cubic-bezier(.25,.8,.3,1); will-change:transform; touch-action:pan-y; }

  .list { height:100%; overflow-y:auto; padding:8px 12px 12px; }
  .empty { text-align:center; color:var(--sub); margin-top:64px; font-size:15px; line-height:1.6; }
  .note-card { background:var(--panel); border:.5px solid var(--border); border-radius:14px; padding:14px 16px; }
  .note-card .nc-title { font-size:16px; font-weight:600; margin-bottom:4px; }
  .note-card .nc-preview { font-size:14px; color:var(--sub); line-height:1.45; max-height:42px; overflow:hidden; }
  .note-card .nc-meta { font-size:12px; color:var(--sub); margin-top:8px; display:flex; gap:10px; align-items:center; }
  .note-card .nc-media { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .m { position:relative; width:54px; height:54px; border-radius:8px; overflow:hidden; border:.5px solid var(--border); background:#eee; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .m img, .m video { width:100%; height:100%; object-fit:cover; }
  .m.audio { background:#eef; font-size:22px; }
  .m .play-badge { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); color:#fff; font-size:14px; text-shadow:0 1px 3px rgba(0,0,0,.6); pointer-events:none; }
  body.shrink .m { width:16px; height:16px; border-radius:3px; font-size:9px; }
  body.shrink .m .play-badge { font-size:8px; }

  /* folder list */
  .folder-row { background:var(--panel); border:.5px solid var(--border); border-radius:14px; padding:16px; display:flex; align-items:center; justify-content:space-between; }
  .folder-row .f-left { display:flex; align-items:center; gap:12px; }
  .folder-row .f-icon { font-size:22px; }
  .folder-row .f-name { font-size:17px; font-weight:600; }
  .folder-row .f-count { font-size:14px; color:var(--sub); }
  .folder-row .f-chev { color:var(--sub); font-size:22px; }
  .folder-row .f-handle { color:var(--sub); font-size:20px; padding:0 4px 0 10px; touch-action:none; cursor:grab; }
  .swipe-wrap.dragging { opacity:.85; }
  .swipe-wrap.dragging .swipe-content { box-shadow:0 8px 24px rgba(0,0,0,.25); }
  .swipe-wrap.drag-placeholder { opacity:.35; }
  /* hide swipe actions until the row is actually moved (prevents flash on render/scroll) */
  .swipe-actions { visibility:hidden; }
  .swipe-wrap.swiping .swipe-actions, .swipe-wrap.opened .swipe-actions { visibility:visible; }

  .editor { position:absolute; inset:0; background:var(--paper); display:none; flex-direction:column; }
  .editor.open { display:flex; }
  .editor .ed-top { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:.5px solid var(--border); background:var(--panel); }
  .ed-top button { border:none; background:none; color:var(--blue); font-size:15px; font-weight:500; padding:8px 6px; }
  .ed-top .del { color:var(--red); }
  .editor .ed-body { flex:1; overflow-y:auto; padding:18px 20px 8px; display:flex; flex-direction:column; }
  .editor input.ed-title { width:100%; border:none; background:transparent; outline:none; font-size:25px; font-weight:700; letter-spacing:-0.02em; margin-bottom:10px; color:var(--text); }
  .editor input.ed-title::placeholder, .editor textarea.ed-text::placeholder { color:var(--sub); opacity:.6; }
  .editor textarea.ed-text { flex:1; width:100%; min-height:120px; border:none; background:transparent; outline:none; font-size:17px; line-height:1.65; resize:none; font-family:inherit; color:var(--text); }
  /* attachments: capped to ~1/3 of editor height, horizontally scrollable */
  .ed-attach { flex:0 0 auto; max-height:33vh; overflow-y:auto; border-top:.5px solid var(--border); margin:8px -20px 0; padding:12px 20px calc(8px + env(safe-area-inset-bottom)); }
  .ed-attach.empty { border-top:none; }
  .ed-attach-label { font-size:12px; font-weight:600; color:var(--sub); letter-spacing:.03em; text-transform:uppercase; margin-bottom:8px; }
  .ed-media { display:flex; flex-wrap:wrap; gap:8px; }
  .ed-media .m .rm { position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,.6); color:#fff; border:none; font-size:12px; line-height:18px; z-index:2; touch-action:manipulation; }
  body.shrink .ed-media .m .rm { width:12px; height:12px; font-size:8px; line-height:12px; }
  .ed-loc { margin-top:16px; }
  .loc-card { background:var(--chip); border-radius:12px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .loc-card .lc-info { font-size:14px; color:var(--text); line-height:1.5; }
  .loc-card .lc-info .lc-coord { color:var(--sub); font-size:12px; font-variant-numeric:tabular-nums; }
  .loc-card .lc-info .lc-status { font-size:12px; margin-top:2px; }
  .loc-card .lc-status.armed { color:var(--green); }
  .loc-card .lc-status.off { color:var(--sub); }
  .loc-card .lc-remove { border:none; background:var(--chip2); color:var(--red); font-size:13px; padding:7px 12px; border-radius:8px; white-space:nowrap; }

  /* Camera floating window 1/3 + 20% opacity + draggable */
  .cam { position:absolute; right:12px; bottom:calc(150px + env(safe-area-inset-bottom)); width:44px; height:59px; background:#000; display:none; flex-direction:column; z-index:30; border-radius:10px; overflow:hidden; box-shadow:0 6px 20px rgba(0,0,0,.35); border:1.5px solid rgba(255,255,255,.85); opacity:.2; touch-action:none; }
  .cam.open { display:flex; }
  .cam video { flex:1; width:100%; height:100%; object-fit:cover; }
  .cam .cam-top { position:absolute; top:2px; left:2px; right:2px; display:flex; justify-content:space-between; z-index:2; }
  .cam .cam-top button { background:rgba(0,0,0,.55); color:#fff; border:none; border-radius:980px; padding:2px 5px; font-size:9px; }
  .cam .rec-badge { position:absolute; top:2px; left:50%; transform:translateX(-50%); display:none; align-items:center; gap:3px; background:rgba(0,0,0,.6); color:#fff; padding:1px 4px; border-radius:980px; font-size:8px; z-index:3; }
  .cam .rec-badge.active { display:flex; }
  .cam .rec-dot { width:5px; height:5px; border-radius:50%; background:var(--red); animation:blink 1s steps(2,start) infinite; }
  @keyframes blink { 50% { opacity:.2; } }
  body.shrink .cam { width:20px; height:27px; }
  body.shrink .cam .cam-top, body.shrink .cam .rec-badge { display:none !important; }

  .cap-dock { position:absolute; right:12px; bottom:calc(72px + env(safe-area-inset-bottom)); display:none; flex-direction:row; gap:10px; z-index:31; align-items:center; }
  .cap-dock.open { display:flex; }
  .cap-dock .big { width:54px; height:54px; border-radius:50%; border:none; background:var(--panel); box-shadow:0 4px 14px rgba(0,0,0,.25); display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
  .cap-dock .big:active { transform:scale(.92); }
  /* photo = triangle */
  .cap-dock .big .ic-tri { width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent; border-bottom:21px solid var(--text); }
  /* video = square (blue when recording, neutral otherwise; no red) */
  .cap-dock .big .ic-sq { width:22px; height:22px; border-radius:5px; border:3px solid var(--text); box-sizing:border-box; }
  .cap-dock .big.recording .ic-sq { background:var(--blue); border-color:var(--blue); border-radius:4px; }

  .viewer { position:absolute; inset:0; background:rgba(0,0,0,.94); display:none; flex-direction:column; z-index:50; }
  .viewer.open { display:flex; }
  .viewer .vw-top { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:calc(10px + env(safe-area-inset-top)) 16px 10px; }
  .viewer .vw-top button { background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:980px; padding:9px 18px; font-size:15px; }
  .viewer .vw-stage { flex:1; display:flex; align-items:center; justify-content:center; padding:8px; overflow:hidden; }
  .viewer .vw-stage img, .viewer .vw-stage video { max-width:100%; max-height:100%; object-fit:contain; border-radius:6px; }
  .viewer .vw-stage audio { width:90%; }
  .viewer .vw-bottom { flex:0 0 auto; display:flex; justify-content:center; gap:12px; padding:12px 16px calc(16px + env(safe-area-inset-bottom)); }
  .viewer .vw-bottom button { background:var(--blue); color:#fff; border:none; border-radius:12px; padding:13px 26px; font-size:16px; font-weight:600; }

  .toolbar { flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:8px 12px calc(8px + env(safe-area-inset-bottom)); border-top:.5px solid var(--border); background:var(--panel); }
  .tb-btn { flex:0 0 auto; height:44px; min-width:44px; padding:0 14px; border-radius:12px; border:none; background:var(--chip); color:var(--text); font-size:15px; font-weight:500; display:flex; align-items:center; gap:6px; }
  .tb-btn:active { background:var(--chip2); }
  .tb-btn.primary { background:var(--accent); color:#fff; }
  .tb-btn.on { background:var(--blue); color:#fff; }
  .tb-btn svg { width:20px; height:20px; }
  .tb-spacer { flex:1; }
  .cap-btn { flex:0 0 auto; width:44px; height:44px; border-radius:12px; border:none; display:flex; align-items:center; justify-content:center; background:var(--chip); }
  .cap-btn:active { background:var(--chip2); }
  .cap-btn .ic-square { width:18px; height:18px; border-radius:5px; background:var(--text); }
  .cap-btn .ic-mic { font-size:20px; }
  .cap-btn#capAudio.on { background:var(--blue); }
  .cap-btn#capAudio.on .ic-mic { filter:none; }

  /* sheet (folder picker / actions) */
  .sheet-bg { position:absolute; inset:0; background:rgba(0,0,0,.35); display:none; z-index:70; }
  .sheet-bg.open { display:block; }
  .sheet { position:absolute; left:8px; right:8px; bottom:calc(8px + env(safe-area-inset-bottom)); background:var(--panel); border-radius:16px; overflow:hidden; }
  .sheet .sh-title { padding:14px 16px; font-size:13px; color:var(--sub); text-align:center; border-bottom:.5px solid var(--border); }
  .sheet .sh-item { padding:16px; font-size:17px; text-align:center; border-bottom:.5px solid var(--border); color:var(--blue); display:flex; align-items:center; justify-content:center; gap:8px; }
  .sheet .sh-item:active { background:var(--chip); }
  .sheet .sh-cancel { margin-top:8px; background:var(--panel); border-radius:16px; padding:16px; text-align:center; font-size:17px; font-weight:600; color:var(--blue); }

  .toast { position:absolute; bottom:84px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,.8); color:#fff; padding:10px 18px; border-radius:980px; font-size:14px; opacity:0; transition:.25s; pointer-events:none; z-index:80; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="header">
    <div class="h-left">
      <button class="folder-btn" id="folderBtn">📁 폴더</button>
      <div class="title" id="title">메모</div>
    </div>
    <div class="count" id="count"></div>
  </div>

  <div class="subbar" id="subbar">
    <div class="search-field">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 11a4 4 0 108 0 4 4 0 00-8 0z" stroke="currentColor" stroke-width="2"/><path d="M14 14l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" placeholder="메모 검색" inputmode="search">
      <button id="searchClear" style="display:none;">✕</button>
    </div>
    <button class="sort-btn" id="sortBtn">정렬 ▾</button>
  </div>

  <div class="main">
    <!-- NOTE LIST -->
    <div class="list" id="list">
      <div class="empty" id="empty">이 폴더에 메모가 없습니다.<br>아래 ‘새 메모’로 시작하세요.</div>
    </div>

    <!-- FOLDER LIST -->
    <div class="list" id="folderList" style="display:none;">
      <div class="empty" id="folderEmpty" style="display:none;">폴더가 없습니다.</div>
    </div>

    <!-- EDITOR -->
    <div class="editor" id="editor">
      <div class="ed-top">
        <button id="edBack">← 목록</button>
        <div style="display:flex;gap:4px;">
          <button id="edLocBtn">📍 위치 알림</button>
          <button class="del" id="edDelete">삭제</button>
        </div>
      </div>
      <div class="ed-body">
        <input class="ed-title" id="edTitle" placeholder="제목">
        <textarea class="ed-text" id="edText" placeholder="메모를 입력하세요…"></textarea>
        <div class="ed-attach" id="edAttach">
          <div class="ed-attach-label" id="edAttachLabel">첨부</div>
          <div class="ed-media" id="edMedia"></div>
          <div class="ed-loc" id="edLoc"></div>
        </div>
      </div>
    </div>

    <!-- CAMERA -->
    <div class="cam" id="cam">
      <div class="cam-top"><button id="camFlip">⟲</button><button id="camClose">✕</button></div>
      <div class="rec-badge" id="recBadge"><span class="rec-dot"></span><span id="recTime">0:00</span></div>
      <video id="preview" playsinline autoplay muted></video>
    </div>
    <div class="cap-dock" id="capDock">
      <button class="big" id="bigPhoto"><span class="ic-tri"></span></button>
      <button class="big" id="bigRec"><span class="ic-sq"></span></button>
    </div>

    <!-- VIEWER -->
    <div class="viewer" id="viewer">
      <div class="vw-top"><button id="vwClose">← 닫기</button><button id="vwDelete" style="background:rgba(255,59,48,.25);">삭제</button></div>
      <div class="vw-stage" id="vwStage"></div>
      <div class="vw-bottom"><button id="vwSave">저장 / 공유</button></div>
    </div>

    <!-- SHEET -->
    <div class="sheet-bg" id="sheetBg">
      <div class="sheet-host" id="sheetHost"></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <div class="toolbar" id="toolbar">
    <button class="tb-btn primary" id="btnNew"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>새 메모</button>
    <button class="tb-btn" id="btnNewFolder" style="display:none;">+ 새 폴더</button>
    <button class="tb-btn" id="btnSave" style="display:none;"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>저장</button>
    <div class="tb-spacer"></div>
    <button class="tb-btn" id="btnDark" aria-label="다크모드">🌙</button>
    <button class="tb-btn" id="btnShrink">⊟</button>
    <button class="cap-btn" id="capPhoto"><span class="ic-square"></span></button>
    <button class="cap-btn" id="capAudio"><span class="ic-mic">🎙️</span></button>
  </div>

<script>
/* ===== IndexedDB (v2: notes + folders) ===== */
const DB_NAME='memoDB', NOTES='notes', FOLDERS='folders'; let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,2);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains(NOTES))d.createObjectStore(NOTES,{keyPath:'id'});
    if(!d.objectStoreNames.contains(FOLDERS))d.createObjectStore(FOLDERS,{keyPath:'id'});
  };
  r.onsuccess=e=>{db=e.target.result;res(db);}; r.onerror=e=>rej(e.target.error);});}
function st(store,m){return db.transaction(store,m).objectStore(store);}
function cleanForSave(v){
  if(v&&v.media){ v.media.forEach(m=>{ delete m._url; delete m._purl; }); }
  return v;
}
function put(store,v){return new Promise((res,rej)=>{const r=st(store,'readwrite').put(store===NOTES?cleanForSave(v):v);r.onsuccess=res;r.onerror=()=>rej(r.error);});}
function del(store,id){return new Promise((res,rej)=>{const r=st(store,'readwrite').delete(id);r.onsuccess=res;r.onerror=()=>rej(r.error);});}
function getAll(store){return new Promise((res,rej)=>{const r=st(store,'readonly').getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}

/* ===== blob URL cache (attach url onto the media/blob to survive DB re-reads) ===== */
const urlCache=new WeakMap();
function blobURL(b){ if(!b)return''; if(urlCache.has(b))return urlCache.get(b); const u=URL.createObjectURL(b); urlCache.set(b,u); return u; }
function mediaURL(m){ if(!m||!m.blob)return''; if(m._url)return m._url; m._url=blobURL(m.blob); return m._url; }
function posterURL(m){ if(!m||!m.poster)return''; if(m._purl)return m._purl; m._purl=blobURL(m.poster); return m._purl; }

const $=id=>document.getElementById(id);
const listEl=$('list'), emptyEl=$('empty'), folderListEl=$('folderList'), editor=$('editor'), cam=$('cam'), capDock=$('capDock');
const toast=$('toast'); let toastTimer;
function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),2000);}

let folders=[], notes=[], currentFolderId=null, current=null, view='notes';
const LAST_KEY='lastFolderId', SORT_KEY='sortMode', DARK_KEY='darkMode';
let sortMode=localStorage.getItem(SORT_KEY)||'updated_desc';
let searchQuery='';

/* ===== bootstrap ===== */
async function init(){
  await openDB();
  folders=await getAll(FOLDERS);
  if(!folders.length){ const f={id:'f_default',name:'메모',created:Date.now(),order:0}; await put(FOLDERS,f); folders=[f]; }
  // assign order to any folders missing it (migration), preserving current array order
  let needOrder=false;
  folders.forEach((f,i)=>{ if(typeof f.order!=='number'){ f.order=i; needOrder=true; } });
  if(needOrder){ for(const f of folders) await put(FOLDERS,f); }
  sortFolders();
  notes=await getAll(NOTES);
  let migrated=false;
  for(const n of notes){ if(!n.folderId){ n.folderId=folders[0].id; await put(NOTES,n); migrated=true; } }
  if(migrated) notes=await getAll(NOTES);
  const last=localStorage.getItem(LAST_KEY);
  currentFolderId = (last && folders.some(f=>f.id===last)) ? last : folders[0].id;
  showNotes();
  ensureGeoWatch();
}
function sortFolders(){ folders.sort((a,b)=>(a.order||0)-(b.order||0)); }
async function persistFolderOrder(){
  folders.forEach((f,i)=>{ f.order=i; });
  for(const f of folders) await put(FOLDERS,f);
}

/* ===== swipe helper (iOS-style) ===== */
function attachSwipe(content, actionWidth){
  let sx=0, sy=0, dx=0, dragging=false, locked=false, open=false;
  const max=actionWidth; const wrap=content.parentElement;
  function reset(){ content.style.transform='translateX(0)'; open=false; wrap.classList.remove('opened','swiping'); }
  content._reset=reset;
  content.addEventListener('touchstart',e=>{ if(e.target.classList.contains('f-handle')){dragging=false;return;} const t=e.touches[0]; sx=t.clientX; sy=t.clientY; dx=0; dragging=true; locked=false; content.style.transition='none'; },{passive:true});
  content.addEventListener('touchmove',e=>{
    if(!dragging)return; const t=e.touches[0]; const mx=t.clientX-sx, my=t.clientY-sy;
    if(!locked){ if(Math.abs(mx)>Math.abs(my)+4){ locked=true; wrap.classList.add('swiping'); } else if(Math.abs(my)>8){ dragging=false; return; } }
    if(!locked)return;
    let base=open?-max:0; dx=base+mx; if(dx>0)dx=0; if(dx<-max-30)dx=-max-30;
    content.style.transform='translateX('+dx+'px)';
    e.preventDefault();
  },{passive:false});
  content.addEventListener('touchend',()=>{
    if(!dragging){return;} dragging=false; content.style.transition='transform .22s cubic-bezier(.25,.8,.3,1)';
    wrap.classList.remove('swiping');
    if(dx < -max/2){ content.style.transform='translateX(-'+max+'px)'; open=true; wrap.classList.add('opened'); } else { reset(); }
  });
  return { reset };
}
let openRows=[];
function closeAllRows(){ openRows.forEach(r=>r._reset&&r._reset()); }

function sortNotes(arr){
  const a=arr.slice();
  switch(sortMode){
    case 'updated_asc': a.sort((x,y)=>x.updated-y.updated); break;
    case 'created_desc': a.sort((x,y)=>(y.created||0)-(x.created||0)); break;
    case 'created_asc': a.sort((x,y)=>(x.created||0)-(y.created||0)); break;
    case 'title_asc': a.sort((x,y)=>(x.title||'').localeCompare(y.title||'','ko')); break;
    case 'title_desc': a.sort((x,y)=>(y.title||'').localeCompare(x.title||'','ko')); break;
    default: a.sort((x,y)=>y.updated-x.updated); // updated_desc
  }
  return a;
}

/* ===== Folder drag-to-reorder (Apple Notes style handle, haptic 3-stage) ===== */
let fDrag=null;
function vib(ms){ try{ navigator.vibrate&&navigator.vibrate(ms); }catch(e){} }
function startFolderDrag(e,wrap,f){
  e.preventDefault(); e.stopPropagation();
  closeAllRows();
  const pt=e.touches?e.touches[0]:e;
  const rect=wrap.getBoundingClientRect();
  fDrag={
    wrap, f,
    grabDY: pt.clientY-rect.top,   // offset of finger inside the row
    width: rect.width, left: rect.left, height: rect.height,
    fromIndex: folders.indexOf(f), lastIndex: folders.indexOf(f),
    placeholder: null
  };
  // placeholder keeps layout space where the row was
  const ph=document.createElement('div'); ph.className='swipe-wrap drag-placeholder'; ph.style.height=rect.height+'px'; ph.dataset.ph='1';
  wrap.parentNode.insertBefore(ph, wrap); fDrag.placeholder=ph;
  // lift the row out of flow, pin to finger
  wrap.classList.add('dragging');
  wrap.style.position='fixed'; wrap.style.left=rect.left+'px'; wrap.style.width=rect.width+'px';
  wrap.style.top=(pt.clientY-fDrag.grabDY)+'px'; wrap.style.zIndex='50'; wrap.style.margin='0';
  vib(12); // pickup
  window.addEventListener('touchmove',onFolderDragMove,{passive:false});
  window.addEventListener('mousemove',onFolderDragMove);
  window.addEventListener('touchend',endFolderDrag);
  window.addEventListener('mouseup',endFolderDrag);
}
function onFolderDragMove(e){
  if(!fDrag)return; e.preventDefault();
  const pt=e.touches?e.touches[0]:e;
  const top=pt.clientY-fDrag.grabDY;
  fDrag.wrap.style.top=top+'px';   // 1:1 follow, no drift
  const center=top+fDrag.height/2;
  // siblings = placeholder + other rows, in DOM order
  const sibs=[...folderListEl.querySelectorAll('.swipe-wrap:not(.dragging)')];
  // compute desired index by comparing center against sibling midpoints
  let target=0;
  for(const s of sibs){
    const r=s.getBoundingClientRect();
    if(center > r.top+r.height/2) target++;
    else break;
  }
  target=Math.max(0,Math.min(folders.length-1,target));
  if(target!==fDrag.lastIndex){
    const idx=folders.indexOf(fDrag.f);
    folders.splice(idx,1); folders.splice(target,0,fDrag.f);
    fDrag.lastIndex=target;
    // move placeholder to new slot among the (non-dragging) rows
    const ph=fDrag.placeholder;
    const others=folders.filter(f=>f!==fDrag.f);
    if(target>=others.length){ folderListEl.appendChild(ph); }
    else {
      const refF=others[target];
      const refEl=folderListEl.querySelector('.swipe-wrap[data-fid="'+refF.id+'"]');
      if(refEl) folderListEl.insertBefore(ph, refEl);
    }
    vib(6); // crossing a slot
  }
}
async function endFolderDrag(){
  if(!fDrag)return;
  const w=fDrag.wrap, ph=fDrag.placeholder;
  // settle the row into the placeholder position
  const r=ph.getBoundingClientRect();
  w.style.transition='top .12s ease, left .12s ease';
  w.style.top=r.top+'px'; w.style.left=r.left+'px';
  setTimeout(()=>{
    w.classList.remove('dragging');
    w.style.position=''; w.style.left=''; w.style.top=''; w.style.width=''; w.style.zIndex=''; w.style.margin=''; w.style.transition='';
    if(ph&&ph.parentNode){ ph.parentNode.insertBefore(w, ph); ph.remove(); }
  },120);
  window.removeEventListener('touchmove',onFolderDragMove);
  window.removeEventListener('mousemove',onFolderDragMove);
  window.removeEventListener('touchend',endFolderDrag);
  window.removeEventListener('mouseup',endFolderDrag);
  const moved=fDrag.lastIndex!==fDrag.fromIndex;
  fDrag=null;
  await persistFolderOrder();
  if(moved){ vib(12); showToast('폴더 순서를 저장했습니다'); } // drop
}

async function renameFolder(f){
  const name=prompt('폴더 이름',f.name);

async function deleteFolder(f){
  if(folders.length<=1){ showToast('마지막 폴더는 삭제할 수 없습니다'); return; }
  const cnt=notes.filter(n=>n.folderId===f.id).length;
  if(!confirm('폴더 "'+f.name+'"'+(cnt?' 및 메모 '+cnt+'개':'')+'를 삭제할까요?'))return;
  for(const n of notes.filter(x=>x.folderId===f.id)){ await del(NOTES,n.id); }
  notes=notes.filter(n=>n.folderId!==f.id);
  await del(FOLDERS,f.id); folders=folders.filter(x=>x.id!==f.id);
  if(currentFolderId===f.id)currentFolderId=folders[0].id;
  renderFolders();
}

/* ===== Location alarm (geofence, Haversine like geotask) ===== */
const GEOFENCE_RADIUS=100; // meters
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function renderLocAlarm(){
  const wrap=$('edLoc'); wrap.innerHTML='';
  if(!current||!current.loc){ updateAttachVisibility&&updateAttachVisibility(); return; }
  const l=current.loc;
  const armed=l.enabled!==false;
  wrap.innerHTML='<div class="loc-card"><div class="lc-info">📍 위치 알림'+
    '<div class="lc-coord">'+l.lat.toFixed(5)+', '+l.lng.toFixed(5)+' (반경 '+GEOFENCE_RADIUS+'m)</div>'+
    '<div class="lc-status '+(armed?'armed':'off')+'">'+(armed?'● 감시 중 — 이 위치 도착 시 알림':'○ 꺼짐')+'</div>'+
    '</div><button class="lc-remove" id="locRemove">제거</button></div>';
  $('locRemove').addEventListener('click',()=>{ delete current.loc; put(NOTES,current); renderLocAlarm(); ensureGeoWatch(); });
  updateAttachVisibility&&updateAttachVisibility();
}
$('edLocBtn').addEventListener('click',()=>{
  if(!current)openEditor(null);
  if(!navigator.geolocation){ showToast('이 기기는 위치를 지원하지 않습니다'); return; }
  maybeAskNotify();
  showToast('현재 위치 확인 중…');
  navigator.geolocation.getCurrentPosition(pos=>{
    current.loc={ lat:pos.coords.latitude, lng:pos.coords.longitude, enabled:true, lastInside:false };
    current.updated=Date.now(); put(NOTES,current);
    if(!notes.some(n=>n.id===current.id))notes.push(current);
    renderLocAlarm(); ensureGeoWatch();
    showToast('현재 좌표를 첨부했습니다');
  },err=>{ showToast('위치 오류: '+err.message); },{enableHighAccuracy:true,timeout:10000});
});

/* geofence watcher: notifies when entering any note's saved location */
let geoWatchId=null;
function notesWithLoc(){ return notes.filter(n=>n.loc&&n.loc.enabled!==false); }
function ensureGeoWatch(){
  const need=notesWithLoc().length>0;
  if(need && geoWatchId===null && navigator.geolocation){
    geoWatchId=navigator.geolocation.watchPosition(onGeo,()=>{},{enableHighAccuracy:true,maximumAge:15000,timeout:20000});
  } else if(!need && geoWatchId!==null){
    navigator.geolocation.clearWatch(geoWatchId); geoWatchId=null;
  }
}
function onGeo(pos){
  const {latitude:la,longitude:lo}=pos.coords;
  notesWithLoc().forEach(n=>{
    const d=haversine(la,lo,n.loc.lat,n.loc.lng);
    const inside=d<=GEOFENCE_RADIUS;
    if(inside && !n.loc.lastInside){
      n.loc.lastInside=true; put(NOTES,n);
      fireLocAlert(n);
    } else if(!inside && n.loc.lastInside){
      n.loc.lastInside=false; put(NOTES,n);
    }
  });
}
function fireLocAlert(n){
  const title=n.title||'메모';
  if('Notification' in window && Notification.permission==='granted'){
    new Notification('📍 '+title, { body:'저장한 위치에 도착했습니다' });
  }
  showToast('📍 "'+title+'" 위치에 도착했습니다');
  try{ navigator.vibrate&&navigator.vibrate([200,100,200]); }catch(e){}
}
/* ask notification permission once when first arming a location */
function maybeAskNotify(){ if('Notification' in window && Notification.permission==='default'){ Notification.requestPermission(); } }

/* ===== VIEWER ===== */
let viewerIndex=-1; const viewer=$('viewer'), vwStage=$('vwStage');
function openViewer(i){
  if(!current||!current.media||!current.media[i])return; viewerIndex=i; const m=current.media[i]; const url=mediaURL(m);
  vwStage.innerHTML=m.kind==='video'?'<video src="'+url+'" controls playsinline autoplay></video>':m.kind==='audio'?'<audio src="'+url+'" controls autoplay></audio>':'<img src="'+url+'">';
  viewer.classList.add('open');
}
function closeViewer(){ viewer.classList.remove('open'); vwStage.innerHTML=''; viewerIndex=-1; }
$('vwClose').addEventListener('click',closeViewer);
$('vwDelete').addEventListener('click',()=>{ if(viewerIndex>=0&&current&&current.media){current.media.splice(viewerIndex,1);put(NOTES,current);renderEditorMedia();} closeViewer(); });
$('vwSave').addEventListener('click',async()=>{
  if(viewerIndex<0||!current)return; const m=current.media[viewerIndex];
  const ext=m.kind==='video'?(m.blob.type.includes('mp4')?'mp4':'webm'):m.kind==='audio'?(m.blob.type.includes('mp4')?'m4a':'webm'):'jpg';
  const filename=(m.kind==='video'?'video_':m.kind==='audio'?'audio_':'photo_')+Date.now()+'.'+ext;
  const file=new File([m.blob],filename,{type:m.blob.type});
  if(navigator.canShare&&navigator.canShare({files:[file]})){ try{ await navigator.share({files:[file]}); showToast('저장 시트를 열었습니다'); return; }catch(e){ if(e&&e.name==='AbortError'){showToast('취소됨');return;} } }
  const url=URL.createObjectURL(m.blob); window.open(url,'_blank'); showToast('새 탭에서 길게 눌러 저장하세요'); setTimeout(()=>URL.revokeObjectURL(url),60000);
});

/* ===== CAMERA ===== */
let stream=null, facing='environment', mediaRecorder=null, recChunks=[], recTimer=null, recStart=0;
const video=$('preview'), bigPhoto=$('bigPhoto'), bigRec=$('bigRec'), recBadge=$('recBadge'), recTime=$('recTime');
async function startStream(withVideo){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  stream=await navigator.mediaDevices.getUserMedia(withVideo?{video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}},audio:true}:{audio:true});
  if(withVideo)video.srcObject=stream;
}
async function openCamera(){
  if(!current)openEditor(null);
  cam.style.left=''; cam.style.top=''; cam.style.right=''; cam.style.bottom='';
  cam.classList.add('open'); capDock.classList.add('open');
  try{ await startStream(true); }catch(e){ showToast('카메라 오류: '+e.name); closeCamera(); }
}
function closeCamera(){
  if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();
  if(stream)stream.getTracks().forEach(t=>t.stop());
  stream=null; cam.classList.remove('open'); capDock.classList.remove('open');
}
$('camClose').addEventListener('click',closeCamera);
$('camFlip').addEventListener('click',async()=>{ facing=facing==='environment'?'user':'environment'; try{await startStream(true);}catch(e){} });

/* drag camera */
(function(){ let dg=false,sx=0,sy=0,ox=0,oy=0;
  function down(e){ if(e.target.closest('.cam-top'))return; const t=e.touches?e.touches[0]:e; dg=true; const r=cam.getBoundingClientRect(); cam.style.right='auto'; cam.style.bottom='auto'; cam.style.left=r.left+'px'; cam.style.top=r.top+'px'; ox=r.left; oy=r.top; sx=t.clientX; sy=t.clientY; e.preventDefault(); }
  function move(e){ if(!dg)return; const t=e.touches?e.touches[0]:e; let nx=ox+(t.clientX-sx), ny=oy+(t.clientY-sy); const w=cam.offsetWidth,h=cam.offsetHeight; nx=Math.max(0,Math.min(innerWidth-w,nx)); ny=Math.max(0,Math.min(innerHeight-h,ny)); cam.style.left=nx+'px'; cam.style.top=ny+'px'; e.preventDefault(); }
  function up(){ dg=false; }
  cam.addEventListener('touchstart',down,{passive:false}); cam.addEventListener('touchmove',move,{passive:false}); cam.addEventListener('touchend',up);
  cam.addEventListener('mousedown',down); addEventListener('mousemove',move); addEventListener('mouseup',up);
})();

async function attachMedia(blob,kind,poster){
  if(!current)openEditor(null);
  current.media=current.media||[]; const item={kind,blob}; if(poster)item.poster=poster; current.media.push(item); current.updated=Date.now();
  await put(NOTES,current); if(!notes.some(n=>n.id===current.id))notes.push(current); renderEditorMedia();
  showToast(kind==='video'?'영상 저장됨':kind==='audio'?'음성 저장됨':'사진 저장됨');
}
function takePhoto(){ if(!stream||!video.videoWidth)return; const s=stream.getVideoTracks()[0].getSettings(); const c=document.createElement('canvas'); c.width=s.width||video.videoWidth; c.height=s.height||video.videoHeight; c.getContext('2d').drawImage(video,0,0,c.width,c.height); c.toBlob(b=>attachMedia(b,'photo'),'image/jpeg',.92); }
function pickMime(cs){ for(const m of cs)if(MediaRecorder.isTypeSupported(m))return m; return ''; }
function toggleRec(){
  if(!stream)return;
  if(mediaRecorder&&mediaRecorder.state==='recording'){ mediaRecorder.stop(); return; }
  recChunks=[]; let poster=null;
  if(video.videoWidth){ const pc=document.createElement('canvas'); pc.width=video.videoWidth; pc.height=video.videoHeight; pc.getContext('2d').drawImage(video,0,0,pc.width,pc.height); pc.toBlob(b=>{poster=b;},'image/jpeg',.7); }
  const mime=pickMime(['video/mp4','video/webm;codecs=h264','video/webm']);
  mediaRecorder=new MediaRecorder(stream,mime?{mimeType:mime}:undefined);
  mediaRecorder.ondataavailable=e=>{ if(e.data.size)recChunks.push(e.data); };
  mediaRecorder.onstop=()=>{ stopRecUI(); attachMedia(new Blob(recChunks,{type:mediaRecorder.mimeType}),'video',poster); };
  mediaRecorder.start(); startRecUI();
}
function startRecUI(){ recStart=Date.now(); bigRec.classList.add('recording'); recBadge.classList.add('active'); recTimer=setInterval(()=>{const s=Math.floor((Date.now()-recStart)/1000);recTime.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');},250); }
function stopRecUI(){ bigRec.classList.remove('recording'); recBadge.classList.remove('active'); recTime.textContent='0:00'; clearInterval(recTimer); }
/* Capture buttons: fire once. Use touchend (preventDefault stops double-tap zoom),
   fall back to click on non-touch. A guard prevents double execution. */
function bindTap(el, fn){
  let touched=false;
  el.addEventListener('touchend',e=>{ e.preventDefault(); touched=true; fn(); setTimeout(()=>touched=false,400); },{passive:false});
  el.addEventListener('click',()=>{ if(touched)return; fn(); });
}
bindTap(bigPhoto, takePhoto);
bindTap(bigRec, toggleRec);
bindTap($('capPhoto'), ()=>{ if(cam.classList.contains('open')) closeCamera(); else openCamera(); });
/* capPhoto handled by bindTap above */

/* audio */
let audioRec=null,audioChunks=[];
async function startAudio(){
  if(!current)openEditor(null);
  try{ const a=await navigator.mediaDevices.getUserMedia({audio:true}); audioChunks=[]; const mime=pickMime(['audio/mp4','audio/webm;codecs=opus','audio/webm']);
    audioRec=new MediaRecorder(a,mime?{mimeType:mime}:undefined);
    audioRec.ondataavailable=e=>{ if(e.data.size)audioChunks.push(e.data); };
    audioRec.onstop=()=>{ a.getTracks().forEach(t=>t.stop()); attachMedia(new Blob(audioChunks,{type:audioRec.mimeType}),'audio'); $('capAudio').classList.remove('on'); };
    audioRec.start(); $('capAudio').classList.add('on'); showToast('🎙️ 녹음 중… 다시 탭하면 정지');
  }catch(e){ showToast('마이크 오류: '+e.name); }
}
/* capAudio handled by bindTap (defined after deps) */
bindTap($('capAudio'), ()=>{ if(audioRec&&audioRec.state==='recording')audioRec.stop(); else startAudio(); });

$('btnShrink').addEventListener('click',()=>{ document.body.classList.toggle('shrink'); const on=document.body.classList.contains('shrink'); $('btnShrink').classList.toggle('on',on); localStorage.setItem('shrinkMode',on?'1':'0'); });

/* ===== Dark mode ===== */
function applyDark(on){ document.body.classList.toggle('dark',on); $('btnDark').textContent=on?'☀️':'🌙'; localStorage.setItem(DARK_KEY,on?'1':'0'); }
$('btnDark').addEventListener('click',()=>applyDark(!document.body.classList.contains('dark')));

/* ===== Search ===== */
$('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value.trim();
  $('searchClear').style.display=searchQuery?'block':'none';
  if(view==='notes')renderNotes(); else renderFolders();
});
$('searchClear').addEventListener('click',()=>{ $('searchInput').value=''; searchQuery=''; $('searchClear').style.display='none'; if(view==='notes')renderNotes(); else renderFolders(); });

/* ===== Sort ===== */
const SORT_LABELS={updated_desc:'수정 최신순',updated_asc:'수정 오래된순',created_desc:'생성 최신순',created_asc:'생성 오래된순',title_asc:'제목 가나다순',title_desc:'제목 역순'};
function updateSortLabel(){ $('sortBtn').textContent='정렬: '+SORT_LABELS[sortMode].split(' ')[0]+' ▾'; }
$('sortBtn').addEventListener('click',()=>{
  let html='<div class="sheet"><div class="sh-title">정렬 방식</div>';
  Object.keys(SORT_LABELS).forEach(k=>{ html+='<div class="sh-item" data-sort="'+k+'">'+SORT_LABELS[k]+(k===sortMode?' ✓':'')+'</div>'; });
  html+='</div>';
  sheetHost.innerHTML=html; sheetBg.classList.add('open');
  sheetHost.querySelectorAll('.sh-item[data-sort]').forEach(el=>el.addEventListener('click',()=>{
    sortMode=el.dataset.sort; localStorage.setItem(SORT_KEY,sortMode); updateSortLabel(); closeSheet(); renderNotes();
  }));
});

/* close swipe rows when tapping elsewhere */
listEl.addEventListener('scroll',closeAllRows); folderListEl.addEventListener('scroll',closeAllRows);

/* restore prefs */
applyDark(localStorage.getItem(DARK_KEY)==='1'); updateSortLabel();
/* thumbnails default to SMALL (shrink). Respect saved preference if user toggled before. */
(function(){
  const saved=localStorage.getItem('shrinkMode');
  const small = saved===null ? true : saved==='1';
  document.body.classList.toggle('shrink',small);
  $('btnShrink').classList.toggle('on',small);
})();
init();
</script>
